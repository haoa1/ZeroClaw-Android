<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style type="text/css">
    <![CDATA[
      .title {
        font-family: Arial, sans-serif;
        font-size: 24px;
        font-weight: bold;
        fill: #2c3e50;
      }
      .subtitle {
        font-family: Arial, sans-serif;
        font-size: 16px;
        fill: #7f8c8d;
      }
      .step {
        fill: #3498db;
        stroke: #2980b9;
        stroke-width: 2;
        rx: 10;
        ry: 10;
      }
      .step-text {
        font-family: Arial, sans-serif;
        font-size: 14px;
        fill: white;
        font-weight: bold;
        text-anchor: middle;
      }
      .step-desc {
        font-family: Arial, sans-serif;
        font-size: 12px;
        fill: #2c3e50;
        text-anchor: middle;
      }
      .arrow {
        fill: none;
        stroke: #7f8c8d;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }
      .arrow-text {
        font-family: Arial, sans-serif;
        font-size: 11px;
        fill: #7f8c8d;
      }
      .user {
        fill: #2ecc71;
        stroke: #27ae60;
      }
      .system {
        fill: #e74c3c;
        stroke: #c0392b;
      }
      .ai {
        fill: #9b59b6;
        stroke: #8e44ad;
      }
      .tool {
        fill: #e67e22;
        stroke: #d35400;
      }
      .decision {
        fill: #1abc9c;
        stroke: #16a085;
      }
      .mcp {
        fill: #008080;
        stroke: #006666;
      }
      .legend-box {
        fill: #ecf0f1;
        stroke: #bdc3c7;
        stroke-width: 1;
        rx: 5;
        ry: 5;
      }
      .legend-text {
        font-family: Arial, sans-serif;
        font-size: 12px;
        fill: #2c3e50;
      }
      .yes {
        fill: #2ecc71;
      }
      .no {
        fill: #e74c3c;
      }
    ]]>
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="title">ZeroClaw Tool Execution Workflow with MCP</text>
  <text x="700" y="65" text-anchor="middle" class="subtitle">AI agent tool invocation with Model Context Protocol integration</text>
  
  <!-- Legend -->
  <rect x="50" y="80" width="250" height="180" class="legend-box"/>
  <text x="175" y="100" text-anchor="middle" class="legend-text" font-weight="bold">Component Types</text>
  
  <rect x="70" y="115" width="20" height="20" class="user"/>
  <text x="100" y="130" class="legend-text">User/Client</text>
  
  <rect x="70" y="140" width="20" height="20" class="system"/>
  <text x="100" y="155" class="legend-text">System Component</text>
  
  <rect x="70" y="165" width="20" height="20" class="ai"/>
  <text x="100" y="180" class="legend-text">AI Component</text>
  
  <rect x="70" y="190" width="20" height="20" class="tool"/>
  <text x="100" y="205" class="legend-text">Tool/Skill</text>
  
  <rect x="70" y="215" width="20" height="20" class="decision"/>
  <text x="100" y="230" class="legend-text">Decision Point</text>
  
  <rect x="70" y="240" width="20" height="20" class="mcp"/>
  <text x="100" y="255" class="legend-text">MCP Protocol</text>
  
  <!-- Workflow Steps -->
  
  <!-- Step 1: User Request -->
  <g id="step1">
    <rect x="100" y="280" width="200" height="60" class="user"/>
    <text x="200" y="305" class="step-text">User Request</text>
    <text x="200" y="325" class="step-desc">User asks question requiring</text>
    <text x="200" y="340" class="step-desc">tool execution</text>
  </g>
  
  <!-- Step 2: Agent Processing -->
  <g id="step2">
    <rect x="100" y="380" width="200" height="60" class="ai"/>
    <text x="200" y="405" class="step-text">Agent Processing</text>
    <text x="200" y="425" class="step-desc">AI analyzes request and</text>
    <text x="200" y="440" class="step-desc">identifies need for tool</text>
  </g>
  
  <!-- Step 3: Tool Decision -->
  <g id="step3">
    <rect x="100" y="480" width="200" height="80" class="decision"/>
    <text x="200" y="505" class="step-text">Tool Required?</text>
    <text x="200" y="530" class="step-desc">Does the task require</text>
    <text x="200" y="545" class="step-desc">external tool/skill?</text>
  </g>
  
  <!-- Yes path -->
  <g id="step4">
    <rect x="350" y="480" width="200" height="60" class="system"/>
    <text x="450" y="505" class="step-text">Tool Registry</text>
    <text x="450" y="525" class="step-desc">Check available tools</text>
    <text x="450" y="540" class="step-desc">and permissions</text>
  </g>
  
  <!-- MCP Tool Discovery -->
  <g id="mcp-discovery">
    <rect x="350" y="570" width="200" height="60" class="mcp"/>
    <text x="450" y="595" class="step-text">MCP Tool Discovery</text>
    <text x="450" y="615" class="step-desc">Discover tools via</text>
    <text x="450" y="630" class="step-desc">Model Context Protocol</text>
  </g>
  
  <!-- Step 5: Tool Selection -->
  <g id="step5">
    <rect x="350" y="660" width="200" height="60" class="ai"/>
    <text x="450" y="685" class="step-text">Tool Selection</text>
    <text x="450" y="705" class="step-desc">Choose appropriate tool</text>
    <text x="450" y="720" class="step-desc">based on task &amp; MCP</text>
  </g>
  
  <!-- Step 6: Approval Check -->
  <g id="step6">
    <rect x="350" y="760" width="200" height="80" class="decision"/>
    <text x="450" y="785" class="step-text">Approval Required?</text>
    <text x="450" y="810" class="step-desc">Does tool execution need</text>
    <text x="450" y="825" class="step-desc">human approval?</text>
  </g>
  
  <!-- MCP Server Component -->
  <g id="mcp-server">
    <rect x="1100" y="480" width="200" height="80" class="mcp"/>
    <text x="1200" y="505" class="step-text">MCP Server</text>
    <text x="1200" y="530" class="step-desc">Model Context Protocol</text>
    <text x="1200" y="545" class="step-desc">tool &amp; context server</text>
  </g>
  
  <!-- Step 7: Tool Execution -->
  <g id="step7">
    <rect x="600" y="760" width="200" height="60" class="tool"/>
    <text x="700" y="785" class="step-text">Tool Execution</text>
    <text x="700" y="805" class="step-desc">Execute tool with</text>
    <text x="700" y="820" class="step-desc">provided parameters</text>
  </g>
  
  <!-- Step 8: Result Processing -->
  <g id="step8">
    <rect x="600" y="660" width="200" height="60" class="ai"/>
    <text x="700" y="685" class="step-text">Result Processing</text>
    <text x="700" y="705" class="step-desc">Process tool output and</text>
    <text x="700" y="720" class="step-desc">integrate into response</text>
  </g>
  
  <!-- Step 9: Response Generation -->
  <g id="step9">
    <rect x="850" y="660" width="200" height="60" class="ai"/>
    <text x="950" y="685" class="step-text">Response Generation</text>
    <text x="950" y="705" class="step-desc">Generate final response</text>
    <text x="950" y="720" class="step-desc">with tool results</text>
  </g>
  
  <!-- Step 10: User Response -->
  <g id="step10">
    <rect x="850" y="480" width="200" height="60" class="user"/>
    <text x="950" y="505" class="step-text">User Response</text>
    <text x="950" y="525" class="step-desc">Receive final answer</text>
    <text x="950" y="540" class="step-desc">with tool execution results</text>
  </g>
  
  <!-- No tool path -->
  <g id="step11">
    <rect x="100" y="630" width="200" height="60" class="ai"/>
    <text x="200" y="655" class="step-text">Direct Response</text>
    <text x="200" y="675" class="step-desc">Generate response without</text>
    <text x="200" y="690" class="step-desc">tool execution</text>
  </g>
  
  <!-- Approval required path -->
  <g id="step12">
    <rect x="600" y="480" width="200" height="60" class="system"/>
    <text x="700" y="505" class="step-text">Approval Workflow</text>
    <text x="700" y="525" class="step-desc">Wait for human approval</text>
    <text x="700" y="540" class="step-desc">before execution</text>
  </g>
  
  <!-- Arrows -->
  
  <!-- Step 1 to 2 -->
  <path d="M 200 340 L 200 380" class="arrow"/>
  <text x="200" y="365" text-anchor="middle" class="arrow-text">User request</text>
  
  <!-- Step 2 to 3 -->
  <path d="M 200 440 L 200 480" class="arrow"/>
  <text x="200" y="465" text-anchor="middle" class="arrow-text">Analysis result</text>
  
  <!-- Decision: Yes to Tool Registry -->
  <path d="M 300 520 L 350 520" class="arrow"/>
  <text x="325" y="515" text-anchor="middle" class="arrow-text">Yes</text>
  
  <!-- Tool Registry to MCP Discovery -->
  <path d="M 450 540 L 450 570" class="arrow"/>
  <text x="450" y="555" text-anchor="middle" class="arrow-text">Tool list</text>
  
  <!-- MCP Discovery to Tool Selection -->
  <path d="M 450 630 L 450 660" class="arrow"/>
  <text x="450" y="645" text-anchor="middle" class="arrow-text">MCP tools</text>
  
  <!-- MCP Server to MCP Discovery -->
  <path d="M 1100 520 L 350 520 L 350 600 L 450 600" class="arrow"/>
  <text x="725" y="560" text-anchor="middle" class="arrow-text">MCP protocol</text>
  
  <!-- Tool Selection to Approval Check -->
  <path d="M 450 720 L 450 760" class="arrow"/>
  <text x="450" y="745" text-anchor="middle" class="arrow-text">Selected tool</text>
  
  <!-- Decision: No approval needed -->
  <path d="M 550 800 L 600 800" class="arrow"/>
  <text x="575" y="795" text-anchor="middle" class="arrow-text">No</text>
  
  <!-- Tool Execution to Result Processing -->
  <path d="M 700 820 L 700 720" class="arrow"/>
  <text x="700" y="770" text-anchor="middle" class="arrow-text">Tool result</text>
  
  <!-- Result Processing to Response Generation -->
  <path d="M 800 690 L 850 690" class="arrow"/>
  <text x="825" y="685" text-anchor="middle" class="arrow-text">Processed result</text>
  
  <!-- Response Generation to User Response -->
  <path d="M 950 720 L 950 540" class="arrow"/>
  <text x="950" y="630" text-anchor="middle" class="arrow-text">Final response</text>
  
  <!-- Decision: Approval required -->
  <path d="M 450 840 L 450 890 L 700 890 L 700 540" class="arrow"/>
  <text x="575" y="875" text-anchor="middle" class="arrow-text">Yes</text>
  
  <!-- Approval Workflow to Tool Execution -->
  <path d="M 700 540 L 700 760" class="arrow"/>
  <text x="700" y="650" text-anchor="middle" class="arrow-text">Approved</text>
  
  <!-- Decision: No tool needed -->
  <path d="M 200 560 L 200 630" class="arrow"/>
  <text x="200" y="595" text-anchor="middle" class="arrow-text">No</text>
  
  <!-- Direct Response to User Response -->
  <path d="M 200 690 L 200 730 L 950 730 L 950 540" class="arrow"/>
  <text x="575" y="735" text-anchor="middle" class="arrow-text">Direct response</text>
  
  <!-- MCP Server to Tool Execution (for direct MCP tool calls) -->
  <path d="M 1200 560 L 1200 760 L 800 760" class="arrow"/>
  <text x="1000" y="710" text-anchor="middle" class="arrow-text">MCP tool execution</text>
  
  <!-- Tool Registry note -->
  <g>
    <rect x="320" y="410" width="260" height="50" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5" ry="5"/>
    <text x="450" y="430" text-anchor="middle" class="step-desc">Tools: Web search, Calculator,</text>
    <text x="450" y="445" text-anchor="middle" class="step-desc">File operations, APIs, etc.</text>
  </g>
  
  <!-- MCP Tool Discovery note -->
  <g>
    <rect x="320" y="500" width="260" height="50" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5" ry="5"/>
    <text x="450" y="520" text-anchor="middle" class="step-desc">Discover tools from MCP</text>
    <text x="450" y="535" text-anchor="middle" class="step-desc">servers (Osaurus, etc.)</text>
  </g>
  
  <!-- Tool Execution note -->
  <g>
    <rect x="570" y="690" width="260" height="50" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5" ry="5"/>
    <text x="700" y="710" text-anchor="middle" class="step-desc">Sandboxed execution with</text>
    <text x="700" y="725" text-anchor="middle" class="step-desc">timeout &amp; resource limits</text>
  </g>
  
  <!-- MCP Server note -->
  <g>
    <rect x="1070" y="400" width="260" height="50" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5" ry="5"/>
    <text x="1200" y="420" text-anchor="middle" class="step-desc">External MCP servers:</text>
    <text x="1200" y="435" text-anchor="middle" class="step-desc">Osaurus, custom MCP, etc.</text>
  </g>
  
  <!-- Footer -->
  <text x="700" y="950" text-anchor="middle" class="subtitle">Figure 2: Tool Execution Workflow with MCP Integration - ZeroClaw Rust Core</text>
</svg>