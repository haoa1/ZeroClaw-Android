<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style type="text/css">
    <![CDATA[
      .layer {
        fill: #f8f9fa;
        stroke: #495057;
        stroke-width: 2;
        rx: 8;
        ry: 8;
      }
      .module {
        fill: #e9ecef;
        stroke: #6c757d;
        stroke-width: 1.5;
        rx: 6;
        ry: 6;
      }
      .component {
        fill: #dbeafe;
        stroke: #1d4ed8;
        stroke-width: 1;
        rx: 4;
        ry: 4;
      }
      .rust-component {
        fill: #fef3c7;
        stroke: #d97706;
        stroke-width: 1;
        rx: 4;
        ry: 4;
      }
      .data-component {
        fill: #dcfce7;
        stroke: #15803d;
        stroke-width: 1;
        rx: 4;
        ry: 4;
      }
      .external {
        fill: #fce7f3;
        stroke: #be185d;
        stroke-width: 1;
        rx: 4;
        ry: 4;
      }
      .text {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 12px;
        fill: #1f2937;
      }
      .title {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 16px;
        font-weight: bold;
        fill: #111827;
      }
      .subtitle {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        font-weight: 600;
        fill: #374151;
      }
      .arrow {
        fill: none;
        stroke: #4b5563;
        stroke-width: 1.5;
        marker-end: url(#arrowhead);
      }
      .dashed-arrow {
        fill: none;
        stroke: #6b7280;
        stroke-width: 1.5;
        stroke-dasharray: 5,5;
        marker-end: url(#arrowhead);
      }
      .label {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 11px;
        fill: #6b7280;
      }
    ]]>
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5563"/>
    </marker>
    <linearGradient id="gradient-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fefce8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#gradient-bg)"/>
  
  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="title" font-size="20">ZeroClaw-Android Detailed Architecture</text>
  <text x="700" y="65" text-anchor="middle" class="subtitle">Kotlin/Compose UI + Rust Core via UniFFI</text>
  
  <!-- Project Structure Overview -->
  <rect x="50" y="90" width="1300" height="80" class="layer"/>
  <text x="700" y="110" text-anchor="middle" class="title">Project Structure</text>
  
  <!-- Project Modules -->
  <rect x="100" y="130" width="250" height="30" class="module"/>
  <text x="225" y="150" text-anchor="middle" class="text">app/ (Android App)</text>
  
  <rect x="380" y="130" width="250" height="30" class="module"/>
  <text x="505" y="150" text-anchor="middle" class="text">lib/ (Library Module)</text>
  
  <rect x="660" y="130" width="250" height="30" class="module"/>
  <text x="785" y="150" text-anchor="middle" class="text">zeroclaw/ (Rust Core)</text>
  
  <rect x="940" y="130" width="250" height="30" class="module"/>
  <text x="1065" y="150" text-anchor="middle" class="text">zeroclaw-android/ (FFI)</text>
  
  <!-- Main Architecture Layers -->
  
  <!-- Layer 1: Android UI Layer (Kotlin/Compose) -->
  <g id="android-ui">
    <rect x="50" y="200" width="1300" height="160" class="layer"/>
    <text x="700" y="220" text-anchor="middle" class="title">Android UI Layer (Kotlin/Compose)</text>
    
    <!-- UI Components -->
    <rect x="80" y="250" width="180" height="90" class="component"/>
    <text x="170" y="270" text-anchor="middle" class="subtitle">Screens</text>
    <text x="170" y="290" text-anchor="middle" class="text">• Dashboard</text>
    <text x="170" y="310" text-anchor="middle" class="text">• Agents</text>
    <text x="170" y="330" text-anchor="middle" class="text">• Terminal</text>
    
    <rect x="280" y="250" width="180" height="90" class="component"/>
    <text x="370" y="270" text-anchor="middle" class="subtitle">Navigation</text>
    <text x="370" y="290" text-anchor="middle" class="text">• ZeroClawNavHost</text>
    <text x="370" y="310" text-anchor="middle" class="text">• Routes</text>
    <text x="370" y="330" text-anchor="middle" class="text">• TopLevelDestination</text>
    
    <rect x="480" y="250" width="180" height="90" class="component"/>
    <text x="570" y="270" text-anchor="middle" class="subtitle">ViewModels</text>
    <text x="570" y="290" text-anchor="middle" class="text">• DashboardViewModel</text>
    <text x="570" y="310" text-anchor="middle" class="text">• AgentsViewModel</text>
    <text x="570" y="330" text-anchor="middle" class="text">• TerminalViewModel</text>
    
    <rect x="680" y="250" width="180" height="90" class="component"/>
    <text x="770" y="270" text-anchor="middle" class="subtitle">UI Components</text>
    <text x="770" y="290" text-anchor="middle" class="text">• Reusable Composables</text>
    <text x="770" y="310" text-anchor="middle" class="text">• Setup Components</text>
    <text x="770" y="330" text-anchor="middle" class="text">• Theme System</text>
    
    <rect x="880" y="250" width="180" height="90" class="component"/>
    <text x="970" y="270" text-anchor="middle" class="subtitle">Models</text>
    <text x="970" y="290" text-anchor="middle" class="text">• Agent, Plugin, Provider</text>
    <text x="970" y="310" text-anchor="middle" class="text">• DaemonStatus, LogEntry</text>
    <text x="970" y="330" text-anchor="middle" class="text">• 20+ Data Classes</text>
    
    <rect x="1080" y="250" width="240" height="90" class="component"/>
    <text x="1200" y="270" text-anchor="middle" class="subtitle">Utilities</text>
    <text x="1200" y="290" text-anchor="middle" class="text">• Extension Functions</text>
    <text x="1200" y="310" text-anchor="middle" class="text">• SharedPreferences</text>
    <text x="1200" y="330" text-anchor="middle" class="text">• Resource Management</text>
  </g>
  
  <!-- Layer 2: Android Services &amp; Data -->
  <g id="android-services">
    <rect x="50" y="380" width="1300" height="160" class="layer"/>
    <text x="700" y="400" text-anchor="middle" class="title">Android Services &amp; Data Layer</text>
    
    <!-- Service Components -->
    <rect x="80" y="430" width="220" height="90" class="component"/>
    <text x="190" y="450" text-anchor="middle" class="subtitle">Services</text>
    <text x="190" y="470" text-anchor="middle" class="text">• ForegroundService</text>
    <text x="190" y="490" text-anchor="middle" class="text">• Daemon Lifecycle</text>
    <text x="190" y="510" text-anchor="middle" class="text">• Notification Manager</text>
    
    <rect x="320" y="430" width="220" height="90" class="data-component"/>
    <text x="430" y="450" text-anchor="middle" class="subtitle">Data Repository</text>
    <text x="430" y="470" text-anchor="middle" class="text">• AgentRepository</text>
    <text x="430" y="490" text-anchor="middle" class="text">• PluginRepository</text>
    <text x="430" y="510" text-anchor="middle" class="text">• Unified Data Access</text>
    
    <rect x="560" y="430" width="220" height="90" class="data-component"/>
    <text x="670" y="450" text-anchor="middle" class="subtitle">Local Database</text>
    <text x="670" y="470" text-anchor="middle" class="text">• Room Database</text>
    <text x="670" y="490" text-anchor="middle" class="text">• 7+ DAOs (Data Access Objects)</text>
    <text x="670" y="510" text-anchor="middle" class="text">• Entities &amp; Converters</text>
    
    <rect x="800" y="430" width="220" height="90" class="data-component"/>
    <text x="910" y="450" text-anchor="middle" class="subtitle">Preferences &amp; Security</text>
    <text x="910" y="470" text-anchor="middle" class="text">• DataStore (Settings)</text>
    <text x="910" y="490" text-anchor="middle" class="text">• EncryptedSharedPreferences</text>
    <text x="910" y="510" text-anchor="middle" class="text">• AES-256-GCM Encryption</text>
    
    <rect x="1040" y="430" width="260" height="90" class="component"/>
    <text x="1170" y="450" text-anchor="middle" class="subtitle">Channels &amp; Connectivity</text>
    <text x="1170" y="470" text-anchor="middle" class="text">• WebSocket Channels</text>
    <text x="1170" y="490" text-anchor="middle" class="text">• OAuth Authentication</text>
    <text x="1170" y="510" text-anchor="middle" class="text">• Remote API Integration</text>
  </g>
  
  <!-- Layer 3: FFI Bridge -->
  <g id="ffi-bridge">
    <rect x="50" y="560" width="1300" height="80" class="layer"/>
    <text x="700" y="580" text-anchor="middle" class="title">FFI Bridge (UniFFI - Mozilla)</text>
    
    <rect x="200" y="600" width="1000" height="20" class="rust-component"/>
    <text x="700" y="615" text-anchor="middle" class="text">34 FFI Functions connecting Kotlin ↔ Rust</text>
    
    <!-- FFI Function Examples -->
    <text x="700" y="640" text-anchor="middle" class="label">start_daemon() • stop_daemon() • get_status() • send_message() • get_version() • eval_repl() • 28+ more functions</text>
  </g>
  
  <!-- Layer 4: Rust Core Engine -->
  <g id="rust-core">
    <rect x="50" y="660" width="1300" height="200" class="layer"/>
    <text x="700" y="680" text-anchor="middle" class="title">Rust Core Engine (ZeroClaw)</text>
    
    <!-- Rust Components -->
    <rect x="80" y="710" width="280" height="130" class="rust-component"/>
    <text x="220" y="730" text-anchor="middle" class="subtitle">AI Agent Gateway</text>
    <text x="220" y="750" text-anchor="middle" class="text">• Message Processing</text>
    <text x="220" y="770" text-anchor="middle" class="text">• Conversation Management</text>
    <text x="220" y="790" text-anchor="middle" class="text">• Tool Execution</text>
    <text x="220" y="810" text-anchor="middle" class="text">• Memory Management</text>
    
    <rect x="380" y="710" width="280" height="130" class="rust-component"/>
    <text x="520" y="730" text-anchor="middle" class="subtitle">Rhai Scripting Engine</text>
    <text x="520" y="750" text-anchor="middle" class="text">• Terminal REPL</text>
    <text x="520" y="770" text-anchor="middle" class="text">• Slash Commands</text>
    <text x="520" y="790" text-anchor="middle" class="text">• Expression Evaluation</text>
    <text x="520" y="810" text-anchor="middle" class="text">• Plugin System</text>
    
    <rect x="680" y="710" width="280" height="130" class="rust-component"/>
    <text x="820" y="730" text-anchor="middle" class="subtitle">Provider Integration</text>
    <text x="820" y="750" text-anchor="middle" class="text">• 32+ AI Providers</text>
    <text x="820" y="770" text-anchor="middle" class="text">• OpenAI, Claude, Gemini</text>
    <text x="820" y="790" text-anchor="middle" class="text">• Ollama, LM Studio</text>
    <text x="820" y="810" text-anchor="middle" class="text">• Custom Endpoints</text>
    
    <rect x="980" y="710" width="330" height="130" class="rust-component"/>
    <text x="1145" y="730" text-anchor="middle" class="subtitle">Core Infrastructure</text>
    <text x="1145" y="750" text-anchor="middle" class="text">• Tokio Async Runtime</text>
    <text x="1145" y="770" text-anchor="middle" class="text">• Health Monitoring</text>
    <text x="1145" y="790" text-anchor="middle" class="text">• Cost Tracking</text>
    <text x="1145" y="810" text-anchor="middle" class="text">• Cron Scheduling</text>
  </g>
  
  <!-- External Systems &amp; Integrations -->
  <g id="external-systems">
    <rect x="50" y="880" width="1300" height="80" class="layer"/>
    <text x="700" y="900" text-anchor="middle" class="title">External Systems &amp; Integrations</text>
    
    <rect x="100" y="920" width="350" height="30" class="external"/>
    <text x="275" y="940" text-anchor="middle" class="text">32+ AI Providers (OpenAI, Anthropic, Gemini, Groq, DeepSeek, etc.)</text>
    
    <rect x="480" y="920" width="350" height="30" class="external"/>
    <text x="655" y="940" text-anchor="middle" class="text">Plugin System (Web Search, Code Execution, File Access, MQTT, Webhooks)</text>
    
    <rect x="860" y="920" width="430" height="30" class="external"/>
    <text x="1075" y="940" text-anchor="middle" class="text">Android System (Notifications, Foreground Service, Battery Optimization, Keystore)</text>
  </g>
  
  <!-- Arrows and Connections -->
  
  <!-- UI to Services -->
  <line x1="170" y1="360" x2="190" y2="380" class="arrow"/>
  <line x1="370" y1="360" x2="430" y2="380" class="arrow"/>
  <line x1="570" y1="360" x2="670" y2="380" class="arrow"/>
  <line x1="770" y1="360" x2="910" y2="380" class="arrow"/>
  <line x1="970" y1="360" x2="1170" y2="380" class="arrow"/>
  <line x1="1200" y1="360" x2="1170" y2="380" class="arrow"/>
  
  <!-- Services to FFI -->
  <line x1="190" y1="520" x2="190" y2="560" class="arrow"/>
  <line x1="430" y1="520" x2="430" y2="560" class="arrow"/>
  <line x1="670" y1="520" x2="670" y2="560" class="arrow"/>
  <line x1="910" y1="520" x2="910" y2="560" class="arrow"/>
  <line x1="1170" y1="520" x2="1170" y2="560" class="arrow"/>
  
  <!-- FFI to Rust Core -->
  <line x1="220" y1="640" x2="220" y2="660" class="arrow"/>
  <line x1="520" y1="640" x2="520" y2="660" class="arrow"/>
  <line x1="820" y1="640" x2="820" y2="660" class="arrow"/>
  <line x1="1145" y1="640" x2="1145" y2="660" class="arrow"/>
  
  <!-- Rust Core to External -->
  <line x1="820" y1="840" x2="820" y2="880" class="arrow"/>
  <line x1="520" y1="840" x2="655" y2="880" class="arrow"/>
  <line x1="1145" y1="840" x2="1075" y2="880" class="arrow"/>
  
  <!-- Data Flow Labels -->
  <text x="300" y="370" text-anchor="middle" class="label">User Input</text>
  <text x="550" y="370" text-anchor="middle" class="label">Data Queries</text>
  <text x="840" y="370" text-anchor="middle" class="label">Settings Access</text>
  <text x="1070" y="370" text-anchor="middle" class="label">Network Calls</text>
  
  <text x="300" y="540" text-anchor="middle" class="label">Service Calls</text>
  <text x="550" y="540" text-anchor="middle" class="label">Data Operations</text>
  <text x="800" y="540" text-anchor="middle" class="label">Secure Storage</text>
  <text x="1070" y="540" text-anchor="middle" class="label">Channel Communication</text>
  
  <text x="700" y="620" text-anchor="middle" class="label">UniFFI Binding (Kotlin ↔ Rust)</text>
  
  <text x="300" y="820" text-anchor="middle" class="label">AI Processing</text>
  <text x="550" y="820" text-anchor="middle" class="label">Script Execution</text>
  <text x="800" y="820" text-anchor="middle" class="label">Provider API Calls</text>
  <text x="1070" y="820" text-anchor="middle" class="label">System Operations</text>
  
  <!-- Legend -->
  <rect x="50" y="970" width="1300" height="20" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="700" y="985" text-anchor="middle" class="label" font-size="10">Legend: Kotlin Components (Blue) | Rust Components (Yellow) | Data Components (Green) | External Systems (Pink)</text>
</svg>