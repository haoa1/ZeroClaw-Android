appId: com.zeroclaw.android
---
- stopApp
- launchApp:
    clearState: true

# Step 1: Permissions
- extendedWaitUntil:
    visible: "Permissions"
    timeout: 30000
- assertVisible: "Step 1 of 5"
- tapOn: "Next"

# Step 2: API Provider
- assertVisible: "API Provider"
- assertVisible: "Step 2 of 5"
- tapOn: "Next"

# Step 3: Agent Configuration
- assertVisible: "Step 3 of 5"
- tapOn: "Next"

# Step 4: Channel Setup
- assertVisible: "Step 4 of 5"
- tapOn: "Next"

# Step 5: Activation
- assertVisible: "Ready to Go"
- tapOn: "Start Daemon"

# Wait for dashboard to appear
- extendedWaitUntil:
    visible: "Daemon Status"
    timeout: 30000
